<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --yellow: #ffcc00;
      --yellow-hover: #f0c000;
      --yellow-dim: rgba(255, 204, 0, 0.14);
      --yellow-dark: #a07c00;
      --sidebar-bg: #18181b;
      --sidebar-border: rgba(255, 255, 255, 0.07);
      --sidebar-text: rgba(255, 255, 255, 0.42);
      --sidebar-hover: rgba(255, 255, 255, 0.06);
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-2: #f0efe9;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.13);
      --text-1: #18181b;
      --text-2: #71717a;
      --text-3: #a1a1aa;
      --radius: 14px;
      --radius-sm: 9px;
      --radius-xs: 6px;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.07), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.07), 0 1px 4px rgba(0, 0, 0, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
      color: var(--text-1);
    }

    /* ── SIDEBAR ── */
    aside {
      width: 230px;
      min-width: 230px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 22px 14px 18px;
      gap: 2px;
      border-right: 1px solid var(--sidebar-border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 2px 8px 0;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark i {
      font-size: 17px;
      color: #18181b;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.03em;
    }

    .logo-text span {
      color: var(--yellow);
    }

    .nav-section {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.22);
      padding: 0 10px;
      margin: 16px 0 5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      color: var(--sidebar-text);
      font-size: 13.5px;
      font-weight: 400;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.13s, color 0.13s;
      position: relative;
    }

    .nav-item i {
      font-size: 17px;
      flex-shrink: 0;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
      color: rgba(255, 255, 255, 0.72);
    }

    .nav-item.active {
      background: rgba(255, 204, 0, 0.13);
      color: var(--yellow);
      font-weight: 500;
    }

    .nav-item.active i {
      color: var(--yellow);
    }

    .nav-badge {
      margin-left: auto;
      background: var(--yellow);
      color: #18181b;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 20px;
    }

    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid var(--sidebar-border);
      padding-top: 14px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .user-pill:hover {
      background: var(--sidebar-hover);
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #18181b;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }

    .user-role {
      font-size: 11px;
      color: var(--sidebar-text);
    }

    .logout {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      color: rgba(248, 82, 82, 0.6);
      font-size: 13px;
      cursor: pointer;
      margin-top: 3px;
      transition: background 0.12s, color 0.12s;
    }

    .logout:hover {
      background: rgba(248, 82, 82, 0.08);
      color: rgba(248, 82, 82, 0.9);
      text-decoration: none;
      text-decoration-line: none;

    }

    .logout i {
      font-size: 16px;
      text-decoration: none;
      text-decoration-line: none;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 30px 32px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .topbar-left h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.03em;
      margin-bottom: 3px;
    }

    .topbar-left p {
      font-size: 13px;
      color: var(--text-2);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: background 0.12s, color 0.12s;
    }

    .icon-btn:hover {
      background: var(--surface-2);
      color: var(--text-1);
    }

    .icon-btn i {
      font-size: 17px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      height: 36px;
      background: var(--yellow);
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 600;
      color: #18181b;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background 0.12s;
    }

    .btn-primary:hover {
      background: var(--yellow-hover);
    }

    .btn-primary i {
      font-size: 15px;
    }

    /* Stat cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow 0.15s;
    }

    .stat:hover {
      box-shadow: var(--shadow-md);
    }

    .stat-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-icon i {
      font-size: 18px;
    }

    .si-yellow {
      background: var(--yellow-dim);
      color: var(--yellow-dark);
    }

    .si-blue {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .si-green {
      background: #dcfce7;
      color: #15803d;
    }

    .si-coral {
      background: #fee2e2;
      color: #b91c1c;
    }

    .delta {
      font-size: 11.5px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .delta.up {
      background: #dcfce7;
      color: #15803d;
    }

    .delta.down {
      background: #fee2e2;
      color: #b91c1c;
    }

    .stat-val {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.04em;
      color: var(--text-1);
      line-height: 1;
    }

    .stat-label {
      font-size: 12.5px;
      color: var(--text-2);
      margin-top: 2px;
    }

    /* Bottom grid */
    .bottom {
      display: grid;
      grid-template-columns: 1fr 310px;
      gap: 14px;
    }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .panel-title i {
      font-size: 16px;
      color: var(--text-3);
    }

    .panel-link {
      font-size: 12px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }

    .panel-link:hover {
      color: var(--yellow-dark);
    }

    .panel-link i {
      font-size: 13px;
    }

    /* Activity list */
    .activity {
      display: flex;
      flex-direction: column;
    }

    .act-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }

    .act-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .act-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .act-dot i {
      font-size: 14px;
    }

    .ad-yellow {
      background: var(--yellow-dim);
      color: var(--yellow-dark);
    }

    .ad-blue {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .ad-green {
      background: #dcfce7;
      color: #15803d;
    }

    .ad-coral {
      background: #fee2e2;
      color: #b91c1c;
    }

    .act-body {
      flex: 1;
    }

    .act-body p {
      font-size: 13px;
      color: var(--text-1);
      margin-bottom: 2px;
      line-height: 1.4;
    }

    .act-body span {
      font-size: 11.5px;
      color: var(--text-3);
    }

    .act-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
      white-space: nowrap;
      margin-top: 3px;
    }

    /* Right column */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Progress */
    .prog-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .prog-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .prog-row {
      display: flex;
      justify-content: space-between;
    }

    .prog-label {
      font-size: 12.5px;
      color: var(--text-2);
    }

    .prog-val {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-1);
      font-family: 'DM Mono', monospace;
    }

    .prog-track {
      height: 5px;
      border-radius: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      border-radius: 20px;
    }

    /* Quick actions */
    .quick-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .quick-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    .quick-item:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
    }

    .quick-icon {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .quick-icon i {
      font-size: 15px;
    }

    .qi-yellow {
      background: var(--yellow-dim);
      color: var(--yellow-dark);
    }

    .qi-blue {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .qi-green {
      background: #dcfce7;
      color: #15803d;
    }

    .quick-label {
      font-size: 13px;
      color: var(--text-1);
      flex: 1;
    }

    .quick-arrow {
      font-size: 14px;
      color: var(--text-3);
    }

    /* Scrollbar */
    main::-webkit-scrollbar {
      width: 5px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <aside>
    <div class="logo">
      <div class="logo-mark"><i class="ti ti-bolt"></i></div>
      <div class="logo-text">Painel<span>.</span></div>
    </div>

    <div class="nav-section">Principal</div>
    <a class="nav-item active">
      <i class="ti ti-layout-dashboard"></i>
      Menu
    </a>
    <a class="nav-item">
      <i class="ti ti-briefcase"></i>
      Estoque
      <span class="nav-badge">4</span>
    </a>
    <a class="nav-item" href="/categorias">
      <i class="ti ti-shopping-cart"></i>
      Categorias
    </a>
    <a class="nav-item" href="/usuarios">
      <i class="ti ti-users"></i>
      Usuários
    </a>

    <a class="nav-item">
      <i class="ti ti-message-circle"></i>
      Relatórios
      <span class="nav-badge">7</span>
    </a>
    <a class="nav-item">
      <i class="ti ti-settings"></i>
      Configurações
    </a>

    <div class="sidebar-footer">
      <div class="nav-section">Conta</div>
      <div class="user-pill">
        <div class="avatar">JD</div>
        <div>
          <div class="user-name">Davi Dono</div>
          <div class="user-role">Administrador</div>
        </div>
      </div>
      <div class="logout">
        <i class="ti ti-logout"></i>
        <a href="/auth/logout" class="logout">Sair</a>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main>

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <h1 style="font-size: 50px;">Olá, Davi!</h1>
        <p>Resumo de hoje — segunda-feira, 12 de maio</p>
      </div>
      <div class="topbar-right">
        <div class="icon-btn" title="Notificações"><i class="ti ti-bell"></i></div>
        <div class="icon-btn" title="Pesquisar"><i class="ti ti-search"></i></div>
        <button class="btn-primary"><i class="ti ti-plus"></i> Novo projeto</button>
      </div>
    </div>


        <!-- Quick actions -->
        <div class="panel" style="flex:1;">
          <div class="panel-head">
            <div class="panel-title"><i class="ti ti-zap"></i>Ações rápidas</div>
          </div>
          <div class="quick-list" >
            <div class="quick-item" >
              <div class="quick-icon qi-yellow" ><i class="ti ti-plus"></i></div>
              <a href="/categorias"><span class="quick-label" >Categorias</span></a>
              <i class="ti ti-chevron-right quick-arrow"></i>
            </div>
            <div class="quick-item">
              <div class="quick-icon qi-blue"><i class="ti ti-file-invoice"></i></div>
              <a href="/produtos"><span class="quick-label" >Produtos</span></a>
              <i class="ti ti-chevron-right quick-arrow"></i>
            </div>
            <div class="quick-item">
              <div class="quick-icon qi-green"><i class="ti ti-package"></i></div>
              <a href="/usuarios"><span class="quick-label" >Usuários</span></a>
              <i class="ti ti-chevron-right quick-arrow"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>
</body>

</html>
